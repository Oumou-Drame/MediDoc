<button class="btn-hamburger" (click)="basculerMenuMobile()" aria-label="Ouvrir le menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
    </svg>
</button>

<div class="sidebar-overlay" *ngIf="menuMobileOuvert" (click)="fermerMenuMobile()"></div>

<aside class="sidebar" [class.repliee]="sidebarReplie" [class.ouverte-mobile]="menuMobileOuvert">

    <div class="sidebar-top">
        <div class="sidebar-logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
            </div>
            <div class="sidebar-brand-texte" *ngIf="!sidebarReplie">
                <span class="sidebar-titre">MediDoc</span>
                <span class="sidebar-soustitre">Résultats médicaux sécurisés</span>
            </div>
        </div>
        <button class="btn-toggle btn-toggle-desktop" (click)="basculerSidebar()"
            [attr.aria-label]="sidebarReplie ? 'Déplier le menu' : 'Replier le menu'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" [style.transform]="sidebarReplie ? 'rotate(180deg)' : 'none'">
                <path d="M15 18l-6-6 6-6" />
            </svg>
        </button>
        <button class="btn-toggle btn-toggle-mobile" (click)="fermerMenuMobile()" aria-label="Fermer le menu">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </button>
    </div>

    <!-- Switch de vue pour les comptes cumulant responsable de labo + technicien (cadrage section 3.4) -->
    <div class="vue-switch" *ngIf="cumuleRoles && !sidebarReplie">
        <button class="vue-btn" [class.actif]="user?.active_view !== 'technician'" (click)="changerVue('lab_manager')">
            Responsable
        </button>
        <button class="vue-btn" [class.actif]="user?.active_view === 'technician'" (click)="changerVue('technician')">
            Technicien
        </button>
    </div>

    <div class="sidebar-section-label" *ngIf="!sidebarReplie">Navigation</div>

    <nav class="sidebar-nav" (click)="fermerMenuMobile()">
        <a *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.route === '/technicien' }" [title]="sidebarReplie ? item.label : ''">

            <svg *ngIf="item.icon === 'dashboard'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="9" rx="1.5" /><rect x="14" y="3" width="7" height="5" rx="1.5" /><rect x="14" y="12" width="7" height="9" rx="1.5" /><rect x="3" y="16" width="7" height="5" rx="1.5" />
            </svg>
            <svg *ngIf="item.icon === 'accounts'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            <svg *ngIf="item.icon === 'history'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 3" />
            </svg>
            <svg *ngIf="item.icon === 'settings'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
            <svg *ngIf="item.icon === 'upload'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <svg *ngIf="item.icon === 'hospitals'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 21h18" /><path d="M5 21V7l7-4 7 4v14" /><path d="M9 9h.01M9 13h.01M15 9h.01M15 13h.01" /><path d="M10 21v-4h4v4" />
            </svg>
            <svg *ngIf="item.icon === 'requests'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-6l-2 3h-4l-2-3H2" /><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" />
            </svg>
            <svg *ngIf="item.icon === 'credits'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="8" /><path d="M12 8v8M9.5 9.5h3.25a1.75 1.75 0 1 1 0 3.5H10.25a1.75 1.75 0 1 0 0 3.5H14" />
            </svg>
            <svg *ngIf="item.icon === 'activity'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>

            <span *ngIf="!sidebarReplie">{{ item.label }}</span>
        </a>
    </nav>

    <div class="sidebar-bottom">
        <div class="sidebar-user" [title]="sidebarReplie ? user?.full_name : ''">
            <div class="avatar-admin">{{ initiales }}</div>
            <div class="sidebar-user-info" *ngIf="!sidebarReplie">
                <div class="sidebar-user-nom">{{ user?.full_name }}</div>
                <div class="sidebar-user-role">{{ roleAffiche }}</div>
            </div>
        </div>

        <a routerLink="/profil" class="sidebar-bottom-link" [title]="sidebarReplie ? 'Mon profil' : ''" (click)="fermerMenuMobile()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
            <span *ngIf="!sidebarReplie">Mon profil</span>
        </a>
        <button class="sidebar-bottom-link btn-logout" (click)="seDeconnecter()" [title]="sidebarReplie ? 'Déconnexion' : ''">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            <span *ngIf="!sidebarReplie">Déconnexion</span>
        </button>
    </div>
</aside>
