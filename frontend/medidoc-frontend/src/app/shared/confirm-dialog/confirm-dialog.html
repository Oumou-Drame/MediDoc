<div class="cd-overlay" *ngIf="visible" (click)="surFond()">
  <div class="cd-card" [class.cd-card--danger]="danger" (click)="$event.stopPropagation()">
    <div class="cd-icone" [class.cd-icone--danger]="danger">
      <svg *ngIf="danger" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
        <line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
      <svg *ngIf="!danger" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" />
      </svg>
    </div>

    <div class="cd-titre">{{ titre }}</div>
    <div class="cd-message">{{ message }}</div>

    <div class="cd-champ" *ngIf="avecChamp">
      <label class="cd-champ-label" *ngIf="labelChamp">{{ labelChamp }}</label>
      <textarea class="cd-champ-textarea" rows="3" [ngModel]="champValeur"
        (ngModelChange)="surChangementChamp($event)"></textarea>
    </div>

    <div class="cd-actions">
      <button type="button" class="cd-btn cd-btn--annuler" (click)="annulerAction.emit()" [disabled]="enCours">
        {{ texteAnnuler }}
      </button>
      <button type="button" class="cd-btn" [class.cd-btn--danger]="danger" [class.cd-btn--primary]="!danger"
        (click)="confirmer.emit()" [disabled]="enCours">
        {{ enCours ? 'Veuillez patienter...' : texteConfirmer }}
      </button>
    </div>
  </div>
</div>
