<div class="login-page">

  <!-- Fond animé -->
  <div class="login-bg">
    <div class="lorb lorb-1"></div>
    <div class="lorb lorb-2"></div>
    <div class="lorb lorb-3"></div>
    <div class="login-grid-overlay"></div>
  </div>

  <a routerLink="/" class="login-back">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12" /><polyline points="12 19 5 12 12 5" />
    </svg>
    Retour à l'accueil
  </a>

  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <div class="login-title">Medi<span class="login-title-accent">Doc</span></div>
      <div class="login-subtitle">Connectez-vous à votre espace</div>
    </div>

    <div class="login-erreur" *ngIf="erreur">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      {{ erreur }}
    </div>

    <form class="login-form">
      <div class="flex-row">
        <label class="lf--label" for="email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
        </label>
        <input id="email" name="email" [(ngModel)]="email" class="lf--input" placeholder="Adresse email" type="email" autocomplete="email">
      </div>

      <div class="flex-row">
        <label class="lf--label" for="password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </label>
        <input id="password" name="password" [(ngModel)]="password" class='lf--input' placeholder='Mot de passe'
          [type]="motDePasseVisible ? 'text' : 'password'" autocomplete="current-password">
        <button type="button" class="btn-oeil" (click)="basculerVisibiliteMotDePasse()"
          [attr.aria-label]="motDePasseVisible ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
          <svg *ngIf="!motDePasseVisible" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          <svg *ngIf="motDePasseVisible" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.9 18.9 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
            <line x1="1" y1="1" x2="23" y2="23" />
          </svg>
        </button>
      </div>

      <input class='lf--submit' type='button' (click)="connection()" [disabled]="connexionEnCours"
        [value]="connexionEnCours ? 'Connexion...' : 'Se connecter'">
    </form>

    <a class='lf--forgot' routerLink="/forgot-password">Mot de passe oublié ?</a>
  </div>

  <div class="login-trust">
    <span class="login-trust-dot"></span>
    Connexion chiffrée · Données isolées par établissement
  </div>

</div>
