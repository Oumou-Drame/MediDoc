<div class="login-page">
  <!-- Floating particles background -->
  <div class="particles">
    <div class="particle" style="--x: 10%; --y: 20%; --size: 8px; --delay: 0s; --duration: 8s;"></div>
    <div class="particle" style="--x: 25%; --y: 60%; --size: 12px; --delay: 1s; --duration: 10s;"></div>
    <div class="particle" style="--x: 70%; --y: 15%; --size: 6px; --delay: 2s; --duration: 7s;"></div>
    <div class="particle" style="--x: 85%; --y: 70%; --size: 10px; --delay: 0.5s; --duration: 9s;"></div>
    <div class="particle" style="--x: 45%; --y: 85%; --size: 7px; --delay: 3s; --duration: 11s;"></div>
  </div>

  <!-- Decorative shapes -->
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>

  <div class="login-card">
    <div class="login-brand">
      <a routerLink="/" class="brand-link">
        <div class="login-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
        </div>
      </a>
      <div class="login-title">MediDoc</div>
      <div class="login-subtitle">Plateforme sécurisée de résultats médicaux</div>
    </div>

    <form class="login-form" (ngSubmit)="connection()">
      <div class="flex-row" [class.focused]="emailFocused">
        <label class="lf--label" for="email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
        </label>
        <input id="email" name="email" [(ngModel)]="email" class="lf--input" placeholder="Adresse email" type="email" autocomplete="email" (focus)="emailFocused = true" (blur)="emailFocused = false">
      </div>

      <div class="flex-row" [class.focused]="passwordFocused">
        <label class="lf--label" for="password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </label>
        <input id="password" name="password" [(ngModel)]="password" class='lf--input' placeholder='Mot de passe'
          type='password' autocomplete="current-password" (focus)="passwordFocused = true" (blur)="passwordFocused = false">
      </div>

      <div class="login-error" *ngIf="errorMessage">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        {{ errorMessage }}
      </div>

      <button type="submit" class="lf--submit" [class.loading]="loading" [disabled]="loading">
        <span *ngIf="!loading">Se connecter</span>
        <span class="spinner" *ngIf="loading"></span>
      </button>
    </form>

    <div class="login-footer">
      <span class="lf--forgot" (click)="forgotPassword()">Mot de passe oublié ?</span>
      <a routerLink="/" class="lf--back-home">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
          <polyline points="9,22 9,12 15,12 15,22" />
        </svg>
        Retour à l'accueil
      </a>
    </div>
  </div>
</div>
