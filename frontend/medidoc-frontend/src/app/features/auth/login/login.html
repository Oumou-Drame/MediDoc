<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <div class="login-title">MediDoc</div>
      <div class="login-subtitle">Connectez-vous à votre espace</div>
    </div>

    <form class="login-form" (ngSubmit)="connection()">
      <div class="flex-row">
        <label class="lf--label" for="username">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </label>
        <input id="username" name="username" [(ngModel)]="name" class="lf--input" placeholder="Nom d'utilisateur" type="text" autocomplete="username">
      </div>

      <div class="flex-row">
        <label class="lf--label" for="password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </label>
        <input id="password" name="password" [(ngModel)]="password" class='lf--input' placeholder='Mot de passe'
          type='password' autocomplete="current-password">
      </div>

      <div class="login-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <input class='lf--submit' [class.loading]="loading" type='submit' [value]="loading ? '' : 'Se connecter'" [disabled]="loading">
    </form>

    <a class='lf--forgot' href='#'>Mot de passe oublié ?</a>
  </div>
</div>
