<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <div class="login-title">Mot de passe oublié</div>
      <div class="login-subtitle">Recevez un lien de réinitialisation par email</div>
    </div>

    <ng-container *ngIf="!messageEnvoye; else confirmation">
      <form class="login-form" (ngSubmit)="envoyer()">
        <div class="flex-row">
          <input name="email" [(ngModel)]="email" class="lf--input" placeholder="Votre email" type="email" required>
        </div>
        <input class="lf--submit" type="submit" [value]="envoiEnCours ? 'Envoi...' : 'Envoyer le lien'" [disabled]="envoiEnCours">
      </form>
    </ng-container>

    <ng-template #confirmation>
      <p style="font-size: 0.85rem; color: #4a6358; text-align: center; line-height: 1.5;">
        Si un compte existe avec cet email, un lien de réinitialisation vient d'être envoyé.
        Vérifiez votre boîte de réception (et vos indésirables).
      </p>
    </ng-template>

    <a class="lf--forgot" routerLink="/login">← Retour à la connexion</a>
  </div>
</div>
