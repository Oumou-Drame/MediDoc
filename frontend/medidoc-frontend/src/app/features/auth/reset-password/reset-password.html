<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <div class="login-title">Nouveau mot de passe</div>
      <div class="login-subtitle">Choisissez un mot de passe pour votre compte</div>
    </div>

    <ng-container *ngIf="!succes; else confirmation">
      <form class="login-form" (ngSubmit)="valider()">
        <div class="flex-row">
          <input name="password" [(ngModel)]="password" class="lf--input" placeholder="Nouveau mot de passe"
            [type]="motDePasseVisible ? 'text' : 'password'" required>
          <button type="button" class="btn-oeil" (click)="basculerVisibiliteMotDePasse()"
            [attr.aria-label]="motDePasseVisible ? 'Masquer le mot de passe' : 'Afficher le mot de passe'">
            <svg *ngIf="!motDePasseVisible" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="motDePasseVisible" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.9 18.9 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
        <div class="flex-row">
          <input name="confirmPassword" [(ngModel)]="confirmPassword" class="lf--input" placeholder="Confirmer le mot de passe"
            [type]="motDePasseVisible ? 'text' : 'password'" required>
        </div>
        <div class="erreur-msg" *ngIf="erreur">{{ erreur }}</div>
        <input class="lf--submit" type="submit" [value]="enregistrementEnCours ? 'Enregistrement...' : 'Valider'" [disabled]="enregistrementEnCours">
      </form>
    </ng-container>

    <ng-template #confirmation>
      <p style="font-size: 0.85rem; color: #1e8c5a; text-align: center; line-height: 1.5; font-weight: 600;">
        Mot de passe mis à jour. Redirection vers la connexion...
      </p>
    </ng-template>

    <a class="lf--forgot" routerLink="/login">← Retour à la connexion</a>
  </div>
</div>
