<div class="app-shell" [class.sidebar-collapsed]="sidebarCollapsed">
  <!-- Sidebar Navigation gauche -->
  <nav [class.collapsed]="sidebarCollapsed">
    <div class="nav-header">
      <a routerLink="/technicien" class="nav-logo">
        <div class="logo-icon-neon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
        </div>
        <span class="nav-logo-text">MediDoc<span class="dot">.</span></span>
      </a>
      <button class="nav-toggle" (click)="toggleSidebar()" title="Réduire la barre latérale">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
          <line x1="9" y1="3" x2="9" y2="21" />
        </svg>
      </button>
    </div>

    <ul class="nav-links">
      <li>
        <a routerLink="/technicien" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13" />
            <path d="M22 2l-7 20-4-9-9-4 20-7z" />
          </svg>
          <span>Nouvel envoi</span>
        </a>
      </li>
      <li>
        <a routerLink="/technicien/historique" routerLinkActive="active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
          <span>Mes envois</span>
        </a>
      </li>
      <li class="nav-divider"></li>
      <li>
        <a routerLink="profil" routerLinkActive="active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <span>Mon profil</span>
        </a>
      </li>
    </ul>

    <div class="nav-footer">
      <div class="nav-user">
        <div class="nav-user-avatar-gradient">{{ initiales }}</div>
        <div class="nav-user-info" *ngIf="!sidebarCollapsed">
          <div class="nav-user-name">{{ nomUtilisateur }}</div>
          <div class="nav-user-role">{{ roleLabel }}</div>
        </div>
      </div>
      <button class="btn-logout" (click)="seDeconnecter()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span *ngIf="!sidebarCollapsed">Déconnexion</span>
      </button>
    </div>
  </nav>

  <!-- Zone de contenu principale -->
  <main>
    <div class="main-glow"></div>
    <router-outlet></router-outlet>
  </main>
</div>
