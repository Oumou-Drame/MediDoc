<nav [class.collapsed]="sidebarCollapsed">
  <div class="nav-header">
    <a href="#" class="nav-logo">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <span class="nav-logo-text" *ngIf="!sidebarCollapsed">MediDoc</span>
    </a>
    <button class="nav-toggle" (click)="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
  </div>

  <ul class="nav-links">
    <li>
      <a routerLink="/admin/dashboard" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
        <span *ngIf="!sidebarCollapsed">Tableau de bord</span>
      </a>
    </li>
    <li>
      <a routerLink="/technicien" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="8.5" cy="7" r="4" />
          <line x1="20" y1="8" x2="20" y2="14" />
          <line x1="23" y1="11" x2="17" y2="11" />
        </svg>
        <span *ngIf="!sidebarCollapsed">Patients</span>
      </a>
    </li>
    <li>
      <a routerLink="/technicien/historique" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
        </svg>
        <span *ngIf="!sidebarCollapsed">Envois / Historique</span>
      </a>
    </li>
    <li *ngIf="isResponsableLabo()">
      <a routerLink="/admin/comptes" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <span *ngIf="!sidebarCollapsed">Comptes & équipe</span>
      </a>
    </li>
    <li *ngIf="isResponsableLabo()">
      <a routerLink="/admin/historique" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        <span *ngIf="!sidebarCollapsed">Journal d'activité</span>
      </a>
    </li>
    <li class="nav-divider"></li>
    <li>
      <a routerLink="/admin/profil" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span *ngIf="!sidebarCollapsed">Mon profil</span>
      </a>
    </li>
  </ul>

  <div class="nav-footer">
    <button class="btn-logout" (click)="seDeconnecter()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      <span *ngIf="!sidebarCollapsed">Déconnexion</span>
    </button>

    <div class="nav-user">
      <div class="nav-user-avatar" [class.badge-ambre]="userRole === 'responsable_labo'" [class.badge-encre]="userRole === 'technicien'">
        {{ initiales }}
      </div>
      <span class="nav-user-info" *ngIf="!sidebarCollapsed">
        <span class="nav-user-name">{{ nomUtilisateur }}</span>
        <span class="nav-user-role" [class.badge-ambre]="userRole === 'responsable_labo'" [class.badge-encre]="userRole === 'technicien'">{{ roleLabel }}</span>
      </span>
    </div>
  </div>
</nav>
<main>
  <router-outlet />
</main>
