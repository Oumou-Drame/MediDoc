<div class="page-header">
    <div>
        <div class="page-title">Demandes d'inscription</div>
        <div class="page-subtitle">Chaque structure de santé est vérifiée manuellement avant validation</div>
    </div>
</div>

<div class="card" *ngIf="!chargement">
    <div class="card-title">{{ requests.length }} demande(s) en attente</div>

    <div class="demandes-liste" *ngIf="requests.length > 0; else vide">
        <button type="button" class="demande-item" *ngFor="let r of requests" (click)="ouvrirDetail(r)">
            <div class="demande-info">
                <div class="demande-nom">{{ r.hospital_name }}</div>
                <div class="demande-contact">{{ r.contact_name }} — {{ r.contact_email }}</div>
                <div class="demande-date">Reçue le {{ r.created_at | date:'dd/MM/yyyy' }}</div>
            </div>
            <div class="demande-badges">
                <span class="demande-doc-status" *ngIf="r.document_status !== 'not_required'">
                    <span [class]="r.document_status === 'verified' ? 'status-verified' : r.document_status === 'rejected' ? 'status-rejected' : 'status-pending'">
                        {{ r.document_status === 'verified' ? 'Documents vérifiés' : r.document_status === 'rejected' ? 'Documents rejetés' : 'Documents en attente' }}
                    </span>
                </span>
                <span class="demande-chevron">›</span>
            </div>
        </button>
    </div>

    <ng-template #vide>
        <div class="empty">Aucune demande en attente</div>
    </ng-template>
</div>
