<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediDoc - Connexion</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon">🏥</div>
        <h1>MediDoc</h1>
        <p class="subtitle">Protection et envoi sécurisé de résultats médicaux</p>
      </div>

      <div id="alert-box"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Nom d'utilisateur</label>
          <input type="text" id="username" name="username" placeholder="Entrez votre identifiant" required>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          🔐 Se connecter
        </button>
      </form>

      <div style="text-align: center; margin-top: 20px;">
        <a href="/patient" style="color: var(--secondary); font-size: 14px; text-decoration: none;">
          📋 Accès patient (avec code)
        </a>
      </div>
    </div>
  </div>

  <script>
    // Check if already logged in
    fetch('/api/auth/me')
      .then(r => r.json())
      .then(data => {
        if (data.user) {
          window.location.href = data.user.role === 'admin' ? '/admin' : '/technician';
        }
      })
      .catch(() => {});

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const alertBox = document.getElementById('alert-box');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          window.location.href = data.user.role === 'admin' ? '/admin' : '/technician';
        } else {
          alertBox.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
        }
      } catch (err) {
        alertBox.innerHTML = `<div class="alert alert-error">Erreur de connexion au serveur</div>`;
      }
    });
  </script>
</body>
</html>
